<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python para IA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Space+Grotesk:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 860px;
    height: 480px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #000;
  }

  .banner {
    width: 860px;
    height: 480px;
    position: relative;
    background: radial-gradient(ellipse at 20% 50%, #0a1628 0%, #050d1a 50%, #000510 100%);
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 200, 255, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 200, 255, 0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridPulse 6s ease-in-out infinite;
  }
  @keyframes gridPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  .orb1 {
    position: absolute;
    width: 380px; height: 380px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 120, 255, 0.18) 0%, transparent 70%);
    top: -80px; left: -60px;
    animation: breathe 5s ease-in-out infinite;
  }
  .orb2 {
    position: absolute;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 220, 255, 0.12) 0%, transparent 70%);
    bottom: -60px; right: 200px;
    animation: breathe 7s ease-in-out infinite reverse;
  }
  .orb3 {
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100, 50, 255, 0.15) 0%, transparent 70%);
    top: 50%; right: 80px;
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  .left {
    position: relative;
    z-index: 10;
    padding: 0 0 0 68px;
    flex: 0 0 auto;
    width: 420px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 180, 255, 0.1);
    border: 1px solid rgba(0, 180, 255, 0.3);
    border-radius: 20px;
    padding: 5px 14px;
    margin-bottom: 22px;
  }
  .badge-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #00d4ff;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,212,255,0.6); }
    50% { box-shadow: 0 0 0 5px rgba(0,212,255,0); }
  }
  .badge-text {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #00d4ff;
  }

  .title-python {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 88px;
    font-weight: 700;
    line-height: 0.9;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #ffffff 0%, #a8d8ff 50%, #00c8ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(0, 180, 255, 0.3));
  }

  .title-para {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 38px;
    font-weight: 300;
    letter-spacing: 6px;
    color: rgba(180, 210, 255, 0.7);
    margin-top: 4px;
    text-transform: uppercase;
  }

  .title-ia {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 88px;
    font-weight: 700;
    line-height: 0.9;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #00c8ff 0%, #0078ff 60%, #5040ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 40px rgba(0, 120, 255, 0.5));
  }

  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, #00c8ff, transparent);
    margin-top: 24px;
  }

  .right {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
  }

  .scene {
    position: relative;
    width: 340px;
    height: 320px;
  }

  .server {
    position: absolute;
    right: 10px;
    top: 30px;
    width: 80px;
    height: 160px;
    background: linear-gradient(180deg, #1a2744 0%, #0f1a35 100%);
    border-radius: 6px;
    border: 1px solid rgba(0, 180, 255, 0.3);
    box-shadow: 0 0 30px rgba(0, 120, 255, 0.2), inset 0 1px 0 rgba(255,255,255,0.05);
    overflow: hidden;
  }
  .server-unit {
    height: 26px;
    margin: 6px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 5px;
  }
  .server-unit:nth-child(1) { background: rgba(0,180,255,0.12); border: 1px solid rgba(0,180,255,0.2); }
  .server-unit:nth-child(2) { background: rgba(80,64,255,0.12); border: 1px solid rgba(80,64,255,0.2); }
  .server-unit:nth-child(3) { background: rgba(0,180,255,0.08); border: 1px solid rgba(0,180,255,0.15); }
  .server-unit:nth-child(4) { background: rgba(0,200,100,0.08); border: 1px solid rgba(0,200,100,0.2); }
  .server-led {
    width: 5px; height: 5px; border-radius: 50%;
    animation: blink 1.5s ease-in-out infinite;
  }
  .led-blue { background: #00c8ff; box-shadow: 0 0 6px #00c8ff; }
  .led-purple { background: #8060ff; box-shadow: 0 0 6px #8060ff; animation-delay: 0.5s; }
  .led-green { background: #00e676; box-shadow: 0 0 6px #00e676; animation-delay: 1s; }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .server-bar { flex: 1; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.1); }

  .laptop-wrap {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 220px;
  }
  .laptop-screen {
    width: 220px;
    height: 140px;
    background: linear-gradient(135deg, #0d1f3c 0%, #0a1628 100%);
    border-radius: 10px 10px 0 0;
    border: 2px solid rgba(0, 180, 255, 0.35);
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 40px rgba(0, 120, 255, 0.25);
  }
  .screen-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(0,120,255,0.12) 0%, transparent 70%);
  }
  .screen-content {
    position: absolute;
    inset: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .code-line {
    height: 6px;
    border-radius: 3px;
    background: rgba(0, 200, 255, 0.2);
    animation: codeSlide 3s ease-in-out infinite;
  }
  .code-line:nth-child(1) { width: 70%; background: rgba(0,200,255,0.3); }
  .code-line:nth-child(2) { width: 50%; margin-left: 14px; animation-delay: 0.2s; }
  .code-line:nth-child(3) { width: 85%; animation-delay: 0.4s; }
  .code-line:nth-child(4) { width: 40%; margin-left: 14px; background: rgba(80,64,255,0.3); animation-delay: 0.6s; }
  .code-line:nth-child(5) { width: 60%; animation-delay: 0.8s; }
  .code-line:nth-child(6) { width: 75%; background: rgba(0,230,118,0.25); animation-delay: 1s; }
  @keyframes codeSlide {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  .py-icon {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
  }

  .laptop-base {
    width: 240px;
    height: 12px;
    margin-left: -10px;
    background: linear-gradient(180deg, #1a2744 0%, #0f1a35 100%);
    border-radius: 0 0 8px 8px;
    border: 1px solid rgba(0,180,255,0.2);
    border-top: none;
  }

  .ai-node {
    position: absolute;
    top: 40px;
    left: 110px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0f2040 0%, #0a1628 100%);
    border: 2px solid rgba(0, 200, 255, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(0, 180, 255, 0.4), 0 0 60px rgba(0, 100, 255, 0.15);
    animation: nodeFloat 3s ease-in-out infinite;
  }
  @keyframes nodeFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .connections {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.4; }
    50% { transform: translateY(-20px) scale(1.2); opacity: 0.8; }
  }
</style>
</head>
<body>
<div class="banner">
  <div class="grid-overlay"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="orb3"></div>

  <div class="left">
    <div class="title-python">PYTHON</div>
    <div class="title-para">para</div>
    <div class="title-ia">IA</div>
    <div class="divider"></div>
  </div>

  <div class="right">
    <div class="scene">
      <svg class="connections" viewBox="0 0 340 320" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00c8ff;stop-opacity:0"/>
            <stop offset="50%" style="stop-color:#00c8ff;stop-opacity:0.8"/>
            <stop offset="100%" style="stop-color:#00c8ff;stop-opacity:0"/>
          </linearGradient>
          <linearGradient id="lineGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#00c8ff;stop-opacity:0.8"/>
            <stop offset="100%" style="stop-color:#5040ff;stop-opacity:0"/>
          </linearGradient>
        </defs>
        <line x1="180" y1="75" x2="256" y2="90" stroke="url(#lineGrad)" stroke-width="1.5" filter="url(#glow)">
          <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
        </line>
        <line x1="145" y1="108" x2="150" y2="180" stroke="url(#lineGrad2)" stroke-width="1.5" filter="url(#glow)">
          <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
        </line>
        <circle r="3" fill="#00c8ff" filter="url(#glow)">
          <animateMotion dur="2s" repeatCount="indefinite" path="M180,75 L256,90"/>
        </circle>
        <circle r="3" fill="#00c8ff" filter="url(#glow)">
          <animateMotion dur="2.5s" repeatCount="indefinite" path="M145,108 L150,180"/>
        </circle>
      </svg>

      <div class="ai-node">
        <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
          <circle cx="19" cy="8" r="4" fill="none" stroke="#00c8ff" stroke-width="1.5"/>
          <circle cx="8" cy="26" r="4" fill="none" stroke="#00c8ff" stroke-width="1.5"/>
          <circle cx="30" cy="26" r="4" fill="none" stroke="#00c8ff" stroke-width="1.5"/>
          <circle cx="19" cy="19" r="3" fill="#00c8ff" opacity="0.6"/>
          <line x1="19" y1="12" x2="19" y2="16" stroke="#00c8ff" stroke-width="1.2" opacity="0.6"/>
          <line x1="16" y1="20" x2="11" y2="23" stroke="#00c8ff" stroke-width="1.2" opacity="0.6"/>
          <line x1="22" y1="20" x2="27" y2="23" stroke="#00c8ff" stroke-width="1.2" opacity="0.6"/>
        </svg>
      </div>

      <div class="server">
        <div class="server-unit">
          <div class="server-led led-blue"></div>
          <div class="server-bar"></div>
        </div>
        <div class="server-unit">
          <div class="server-led led-purple"></div>
          <div class="server-bar"></div>
        </div>
        <div class="server-unit">
          <div class="server-led led-blue"></div>
          <div class="server-bar"></div>
        </div>
        <div class="server-unit">
          <div class="server-led led-green"></div>
          <div class="server-bar"></div>
        </div>
      </div>

      <div class="laptop-wrap">
        <div class="laptop-screen">
          <div class="screen-glow"></div>
          <div class="screen-content">
            <div class="code-line"></div>
            <div class="code-line"></div>
            <div class="code-line"></div>
            <div class="code-line"></div>
            <div class="code-line"></div>
            <div class="code-line"></div>
          </div>
          <svg class="py-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15.9 2C12 2 10 3.5 10 6v3h6v1H7.5C5 10 3 11.8 3 16s2 6 4.5 6H9v-3.5c0-2.5 2-4.5 7-4.5h6c2.5 0 4-1.3 4-4V6c0-2.5-2.3-4-10.1-4zM13 5.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z" fill="#3776ab" opacity="0.9"/>
            <path d="M16.1 30c3.9 0 5.9-1.5 5.9-4v-3h-6v-1h8.5C27 22 29 20.2 29 16s-2-6-4.5-6H23v3.5c0 2.5-2 4.5-7 4.5h-6C7.5 18 6 19.3 6 22v4c0 2.5 2.3 4 10.1 4zM19 26.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z" fill="#ffd43b" opacity="0.9"/>
          </svg>
        </div>
        <div class="laptop-base"></div>
      </div>

      <div class="particle" style="width:4px;height:4px;background:#00c8ff;top:60px;left:50px;animation-delay:0s;"></div>
      <div class="particle" style="width:3px;height:3px;background:#5040ff;top:150px;left:30px;animation-delay:1s;"></div>
      <div class="particle" style="width:5px;height:5px;background:#00c8ff;top:100px;right:30px;animation-delay:0.5s;"></div>
      <div class="particle" style="width:3px;height:3px;background:#00e676;bottom:60px;right:60px;animation-delay:1.5s;"></div>
    </div>
  </div>
</div>
</body>
</html>
